<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message | Graphic Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="graphic-header">
        <nav class="graphic-navbar">
            <div class="graphic-logo-mark">MUHAMMAD.STUDIO</div>
            <div class="graphic-navigation-links">
                <a href="index.html">INDEX</a>
                <a href="about.html">BIOGRAPHY</a>
                <a href="projects.html">COLLECTIONS</a>
                <a href="planner.html">TRACKER</a>
                <a href="contact.html" class="active-item">MESSAGE</a>
            </div>
        </nav>
    </header>

    <main class="graphic-body-container narrow-view-block">
        <h2 class="graphic-block-heading">Communications Channel</h2>
        <p class="graphic-block-desc-text">Submit transmission parameter values inside the script pipeline handler card evaluated below.</p>

        <form id="studioVerificationForm" class="graphic-styled-form" novalidate>
            <div id="studioValidationAlertConsole" class="graphic-alert-overlay-box state-hidden"></div>

            <div class="graphic-input-block">
                <label for="studioInputName">User Identification Name</label>
                <input type="text" id="studioInputName" placeholder="Enter text label name details">
            </div>

            <div class="graphic-input-block">
                <label for="studioInputEmail">Electronic Address Domain</label>
                <input type="email" id="studioInputEmail" placeholder="username@server.domain">
            </div>

            <div class="graphic-input-block">
                <label for="studioInputPhone">Telephone Number Sequence</label>
                <input type="tel" id="studioInputPhone" placeholder="Enter absolute digits chain configuration">
            </div>

            <div class="graphic-input-block">
                <label for="studioInputMessage">Text Message Core Payload</label>
                <textarea id="studioInputMessage" rows="5" placeholder="Enter contextual request details here..."></textarea>
            </div>

            <button type="submit" class="graphic-action-btn solid-color-btn stretch-btn">Validate & Submit Context</button>
        </form>
    </main>

    <footer class="graphic-site-footer">
        <p>&copy; 2026 Muhammad Adekunle &bull; Graphic Studio Platform.</p>
    </footer>

    <script src="contact.js"></script>
</body>
</html>
