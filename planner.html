        <h2 class="graphic-block-heading">Milestone Tracker Module</h2>

        <section class="graphic-planner-card-box">
            <div class="graphic-flex-form-row">
                <input type="text" id="studioTaskInputField" placeholder="Enter upcoming item label details...">

            <div class="graphic-tracker-status-bar">
                <span>Task Array Output Pipeline</span>
